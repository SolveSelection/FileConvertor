<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML to PDF Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>HTML to PDF Converter</h1>
        <p class="subtitle">
          Upload multiple HTML files and download a ZIP with matching PDF names.
        </p>

        <form id="convertForm">
          <label class="label" for="htmlFiles">HTML files</label>
          <input id="htmlFiles" name="htmlFiles" type="file" accept=".html" multiple required />

          <div class="grid">
            <div>
              <label class="label" for="format">Format</label>
              <select id="format" name="format">
                <option value="A4" selected>A4</option>
                <option value="Letter">Letter</option>
                <option value="Legal">Legal</option>
              </select>
            </div>
            <div>
              <label class="label" for="scale">Scale (0.1 - 2)</label>
              <input id="scale" name="scale" type="number" min="0.1" max="2" step="0.1" value="1" />
            </div>
          </div>

          <div class="checkboxes">
            <label><input id="landscape" name="landscape" type="checkbox" /> Landscape</label>
            <label><input id="printBackground" name="printBackground" type="checkbox" checked /> Print background</label>
          </div>

          <button id="submitBtn" type="submit">Convert Files</button>
        </form>

        <p id="status" class="status"></p>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
